<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - La Majorit&eacute;</title>
  <link rel="icon" type="image/png" href="assets/logo-majorite.png">
  <link rel="apple-touch-icon" href="assets/logo-majorite.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <main class="admin-shell">
    <section class="admin-panel">
      <header class="admin-header">
        <div>
          <p class="eyebrow">Zone protegee</p>
          <h1>Admin</h1>
        </div>
        <a class="admin-link" href="/">Retour au jeu</a>
      </header>

      <form id="adminLogin" class="admin-login">
        <label for="adminToken">Token admin</label>
        <div class="name-row">
          <input id="adminToken" type="password" autocomplete="current-password" placeholder="ADMIN_TOKEN">
          <button class="primary-button compact" type="submit">Entrer</button>
        </div>
      </form>

      <section id="adminContent" class="admin-content hidden">
        <div id="adminStats" class="admin-stats"></div>

        <div class="admin-actions">
          <button id="refreshScores" class="secondary-button" type="button">Actualiser</button>
          <button id="resetScores" class="ghost-button danger-action" type="button">Reset classement</button>
          <button id="resetAll" class="ghost-button danger-action" type="button">Reset votes + scores</button>
        </div>

        <section class="admin-section">
          <h2>Moderation</h2>
          <form id="blockForm" class="admin-inline-form">
            <input id="blockPseudo" type="text" maxlength="18" placeholder="Pseudo a bloquer">
            <input id="blockReason" type="text" maxlength="120" placeholder="Raison">
            <button class="ghost-button danger-action" type="submit">Bloquer</button>
          </form>
          <div id="blockedList" class="admin-list compact-list"></div>
        </section>

        <section class="admin-section">
          <h2>Messages signales</h2>
          <div id="reportsList" class="admin-list compact-list"></div>
        </section>

        <section class="admin-section">
          <h2>Devblog</h2>
          <form id="devblogForm" class="admin-devblog-form">
            <input id="devblogTitle" type="text" maxlength="100" placeholder="Titre de la nouveaute">
            <textarea id="devblogContent" maxlength="3000" placeholder="Ecris les nouveautes de la mise a jour..."></textarea>
            <button class="secondary-button" type="submit">Publier</button>
          </form>
          <div id="devblogList" class="admin-list compact-list"></div>
        </section>

        <section class="admin-section">
          <h2>Questions</h2>
          <form id="questionSearchForm" class="admin-inline-form">
            <input id="questionSearch" type="text" placeholder="Chercher une question">
            <button class="secondary-button" type="submit">Chercher</button>
          </form>
          <div id="questionsList" class="admin-list"></div>
        </section>

        <p id="adminStatus" class="save-status" aria-live="polite"></p>
        <div id="scoresList" class="admin-list"></div>
      </section>
    </section>
  </main>
  <script src="admin.js"></script>
</body>
</html>
