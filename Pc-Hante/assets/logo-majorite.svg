    <path d="M256 96c23 0 41 14 41 35 0 18-10 27-26 36-7 4-10 8-10 17v7h-27v-10c0-18 9-28 24-36 10-6 15-10 15-19 0-8-7-14-18-14-13 0-22 7-24 20h-29c4-22 22-36 54-36Z" fill="url(#gold)"/>
    <circle cx="248" cy="214" r="15" fill="url(#gold)"/>
  </g>

