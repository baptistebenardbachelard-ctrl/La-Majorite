    <linearGradient id="blue" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#9fb3c3"/>
      <stop offset="100%" stop-color="#5e788b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000" flood-opacity="0.32"/>
