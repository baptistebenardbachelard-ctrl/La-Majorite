<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">La Majorite</title>
  <desc id="desc">Logo rond La Majorite avec groupe de joueurs, bulle de question et texte.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="62%">
      <stop offset="0%" stop-color="#122336"/>
      <stop offset="68%" stop-color="#07111d"/>
      <stop offset="100%" stop-color="#040913"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#ffe177"/>
      <stop offset="100%" stop-color="#ffb63d"/>
