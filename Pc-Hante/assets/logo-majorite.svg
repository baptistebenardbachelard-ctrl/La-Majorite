  <path d="M96 405h93M323 405h93" stroke="#fff" stroke-width="8" stroke-linecap="round" opacity="0.9"/>
  <text x="256" y="425" text-anchor="middle" fill="#fff" font-family="Inter, Arial, sans-serif" font-size="31" font-weight="900" letter-spacing="8">LA</text>
  <text x="256" y="475" text-anchor="middle" fill="#fff" font-family="Inter, Arial, sans-serif" font-size="46" font-weight="900" letter-spacing="8">MAJORITE</text>
